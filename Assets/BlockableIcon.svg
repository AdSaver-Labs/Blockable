<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="icon-surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#e6edf7"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ff7b83"/><stop offset="1" stop-color="#d94763"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffc15d"/><stop offset="1" stop-color="#e48a22"/></linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffe878"/><stop offset="1" stop-color="#e4b52e"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#43d1a1"/><stop offset="1" stop-color="#128d70"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#62b2ff"/><stop offset="1" stop-color="#2375d3"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ac9aff"/><stop offset="1" stop-color="#6855cf"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#263c5b" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect x="42" y="42" width="940" height="940" rx="226" fill="url(#icon-surface)"/>
  <g filter="url(#soft-shadow)">
    <g stroke="#fff" stroke-opacity=".32" stroke-width="5">
      <rect x="214" y="216" width="180" height="180" rx="42" fill="url(#red)"/>
      <rect x="214" y="422" width="180" height="180" rx="42" fill="url(#orange)"/>
      <rect x="422" y="422" width="180" height="180" rx="42" fill="url(#yellow)"/>
      <rect x="214" y="628" width="180" height="180" rx="42" fill="url(#green)"/>
      <rect x="422" y="628" width="180" height="180" rx="42" fill="url(#blue)"/>
      <rect x="630" y="628" width="180" height="180" rx="42" fill="url(#violet)"/>
    </g>
    <g fill="#fff" fill-opacity=".38">
      <rect x="238" y="238" width="132" height="20" rx="10"/>
      <rect x="238" y="444" width="132" height="20" rx="10"/>
      <rect x="446" y="444" width="132" height="20" rx="10"/>
      <rect x="238" y="650" width="132" height="20" rx="10"/>
      <rect x="446" y="650" width="132" height="20" rx="10"/>
      <rect x="654" y="650" width="132" height="20" rx="10"/>
    </g>
  </g>
</svg>
