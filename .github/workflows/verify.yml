name: Verify

on:
  push:
  pull_request:

jobs:
  web-and-packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:web
      - run: npm run verify
      - run: npm audit --audit-level=high
